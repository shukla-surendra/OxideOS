name: Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            nasm xorriso mtools dosfstools \
            gcc-x86-64-linux-gnu qemu-utils

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rust-src

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kernel/target
            userspace/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Download Limine bootloader
        run: make limine/limine

      - name: Build userspace (Rust programs only)
        run: |
          cd userspace
          cargo +nightly build --release \
            -p hello-rust -p sh -p terminal -p coreutils \
            -p wget -p edit -p nc -p filemanager -p install 2>&1
          mkdir -p bin
          cp target/x86_64-unknown-none/release/sh           bin/sh.elf
          cp target/x86_64-unknown-none/release/terminal     bin/terminal.elf
          cp target/x86_64-unknown-none/release/ls           bin/ls.elf
          cp target/x86_64-unknown-none/release/cat          bin/cat.elf
          cp target/x86_64-unknown-none/release/ps           bin/ps.elf
          cp target/x86_64-unknown-none/release/cp           bin/cp.elf
          cp target/x86_64-unknown-none/release/mkdir        bin/mkdir.elf
          cp target/x86_64-unknown-none/release/pwd          bin/pwd.elf
          cp target/x86_64-unknown-none/release/wget         bin/wget.elf
          cp target/x86_64-unknown-none/release/edit         bin/edit.elf
          cp target/x86_64-unknown-none/release/nc           bin/nc.elf
          cp target/x86_64-unknown-none/release/rm           bin/rm.elf
          cp target/x86_64-unknown-none/release/mv           bin/mv.elf
          cp target/x86_64-unknown-none/release/filemanager  bin/filemanager.elf
          cp target/x86_64-unknown-none/release/echo         bin/echo.elf
          cp target/x86_64-unknown-none/release/grep         bin/grep.elf
          cp target/x86_64-unknown-none/release/wc           bin/wc.elf
          cp target/x86_64-unknown-none/release/head         bin/head.elf
          cp target/x86_64-unknown-none/release/tail         bin/tail.elf
          cp target/x86_64-unknown-none/release/sort         bin/sort.elf
          cp target/x86_64-unknown-none/release/sleep        bin/sleep.elf
          cp target/x86_64-unknown-none/release/kill         bin/kill.elf
          cp target/x86_64-unknown-none/release/touch        bin/touch.elf
          cp "target/x86_64-unknown-none/release/true"       bin/true.elf
          cp "target/x86_64-unknown-none/release/false"      bin/false.elf
          cp target/x86_64-unknown-none/release/install      bin/install.elf
          cp target/x86_64-unknown-none/release/hello_rust   bin/hello_rust.elf

      - name: Build kernel
        run: |
          cd kernel
          cargo +nightly build --release \
            --target x86_64-unknown-none \
            -Z build-std=core,alloc \
            -Z build-std-features=compiler-builtins-mem

      - name: Build ISO
        run: make

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: oxide_os-x86_64.iso
          path: oxide_os-x86_64.iso
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: oxide_os-x86_64.iso

      - name: Create rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from the latest commit on `master`.

            **Run in QEMU:**
            ```bash
            qemu-system-x86_64 -M pc -serial stdio -cdrom oxide_os-x86_64.iso \
              -boot d -m 2G -cpu max \
              -netdev user,id=net0 -device rtl8139,netdev=net0
            ```
          files: oxide_os-x86_64.iso
          prerelease: true
