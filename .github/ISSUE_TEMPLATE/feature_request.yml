name: Feature Request
description: Suggest a new syscall, driver, filesystem, or capability
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that OxideOS can't do today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see implemented?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New syscall (Linux compatibility)
        - New driver (hardware support)
        - New filesystem
        - Networking
        - GUI
        - Shell / userspace program
        - Build system / tooling
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, references, similar implementations in other hobby OSes, etc.
